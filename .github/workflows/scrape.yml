name: Daily Job Scraper Bot

on:
  workflow_dispatch: # Allows you to click "Run workflow" manually
  schedule:
    - cron: "0 */6 * * *" # Automatically runs every 6 hours

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Scraper
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scraper.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add sent_jobs.json
          # This line ensures it only commits if a new job was actually added to the file
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update sent jobs list" && git push)
